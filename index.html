<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hihi</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #000; overflow: hidden; cursor: crosshair; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="mycanvas"></canvas>
    
    <script>
    const CONFIG = {
        particleCount: 160,     
        gravity: 0.08,          
        friction: 0.96,        
        autoFirework: true,
        autoInterval: 40, // 自动发射间隔（值越小越快）
        palettes: [180, 210, 280, 330, 45] 
    };

    const canvas = document.getElementById("mycanvas");
    const ctx = canvas.getContext("2d");
    let clientW = canvas.width = window.innerWidth;
    let clientH = canvas.height = window.innerHeight;

    let fireworks = [], particles = [];
    let currentHue = 180;
    let tick = 0; // 独立的计数器

    function random(min, max) { return Math.random() * (max - min) + min; }

    // --- 城堡 3.1：霓虹流光版 ---
    function drawCastle() {
        const cx = clientW / 2;
        const b = clientH - 5;
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.strokeStyle = `hsla(${currentHue}, 90%, 60%, 0.3)`;
        ctx.lineWidth = 1;
        ctx.shadowBlur = 10;
        ctx.shadowColor = `hsla(${currentHue}, 100%, 50%, 0.5)`;

        function tower(x, w, h) {
            ctx.strokeRect(x - w/2, b - h, w, h);
            ctx.beginPath();
            ctx.moveTo(x - w/2, b - h);
            ctx.lineTo(x, b - h - w * 1.5);
            ctx.lineTo(x + w/2, b - h);
            ctx.stroke();
        }

        tower(cx, 35, 180);      // 主塔
        tower(cx - 70, 25, 120); // 左侧塔
        tower(cx + 70, 25, 120); // 右侧塔
        tower(cx - 130, 15, 70); // 裙楼
        tower(cx + 130, 15, 70); // 裙楼
        ctx.restore();
    }

    class Firework {
        constructor(sx, sy, tx, ty) {
            this.x = sx; this.y = sy;
            this.sx = sx; this.sy = sy;
            this.tx = tx; this.ty = ty;
            this.trail = [];
            let len = 5; while(len--) this.trail.push({x: sx, y: sy});
            this.angle = Math.atan2(ty - sy, tx - sx);
            this.speed = 2; 
            this.acc = 1.045;
            this.hue = CONFIG.palettes[Math.floor(Math.random() * CONFIG.palettes.length)];
            this.targetDist = Math.sqrt((tx-sx)**2 + (ty-sy)**2);
            this.distTraveled = 0;
        }
        update(index) {
            this.trail.pop(); 
            this.trail.unshift({x: this.x, y: this.y});
            this.speed *= this.acc;
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;
            this.distTraveled += this.speed;
            
            if (this.distTraveled >= this.targetDist) {
                currentHue = this.hue; 
                for (let i = 0; i < CONFIG.particleCount; i++) particles.push(new Particle(this.tx, this.ty, this.hue));
                fireworks.splice(index, 1);
            }
        }
        draw() {
            ctx.beginPath();
            ctx.moveTo(this.trail[this.trail.length - 1].x, this.trail[this.trail.length - 1].y);
            ctx.lineTo(this.x, this.y);
            ctx.strokeStyle = `hsla(${this.hue}, 100%, 80%, 1)`;
            ctx.lineWidth = 2; 
            ctx.stroke();
        }
    }

    class Particle {
        constructor(x, y, hue) {
            this.x = x; this.y = y;
            this.trail = []; let len = 10; while(len--) this.trail.push({x: x, y: y});
            this.angle = random(0, Math.PI * 2);
            this.speed = random(1, 10);
            this.friction = CONFIG.friction; 
            this.gravity = CONFIG.gravity;
            this.hue = random(hue - 20, hue + 20);
            this.alpha = 1; 
            this.decay = random(0.01, 0.02);
        }
        update(index) {
            this.trail.pop(); 
            this.trail.unshift({x: this.x, y: this.y});
            this.speed *= this.friction;
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed + this.gravity;
            this.alpha -= this.decay;
            if (this.alpha <= 0) particles.splice(index, 1);
        }
        draw() {
            ctx.beginPath();
            ctx.moveTo(this.trail[this.trail.length - 1].x, this.trail[this.trail.length - 1].y);
            for(let i=this.trail.length-2; i>=0; i--) ctx.lineTo(this.trail[i].x, this.trail[i].y);
            ctx.strokeStyle = `hsla(${this.hue}, 100%, 65%, ${this.alpha})`;
            ctx.lineWidth = 1.5; 
            ctx.stroke();
        }
    }

    function launch() {
        const cx = clientW / 2;
        const sx = random(cx - 150, cx + 150);
        const sy = clientH;
        const tx = random(clientW * 0.1, clientW * 0.9);
        const ty = random(clientH * 0.1, clientH * 0.45);
        fireworks.push(new Firework(sx, sy, tx, ty));
    }

    canvas.addEventListener('mousedown', (e) => {
        const cx = clientW / 2;
        fireworks.push(new Firework(random(cx - 150, cx + 150), clientH, e.clientX, e.clientY));
    });

    window.addEventListener('resize', () => {
        clientW = canvas.width = window.innerWidth;
        clientH = canvas.height = window.innerHeight;
    });

    function loop() {
        requestAnimationFrame(loop);
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; 
        ctx.fillRect(0, 0, clientW, clientH);
        
        drawCastle();
        
        ctx.globalCompositeOperation = 'lighter';
        let i = fireworks.length; while(i--) { fireworks[i].draw(); fireworks[i].update(i); }
        let j = particles.length; while(j--) { particles[j].draw(); particles[j].update(j); }
        
        if (CONFIG.autoFirework) {
            tick++;
            if (tick >= CONFIG.autoInterval) {
                launch();
                tick = 0;
            }
        }
    }

    loop();
    </script>
</body>
</html>
