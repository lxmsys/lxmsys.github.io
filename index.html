<!DOCTYPE html>
<html>
<head lang="zh-CN">
    <meta charset="UTF-8">
    <title>🎆 烟花</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let W = canvas.width = window.innerWidth;
    let H = canvas.height = window.innerHeight;
    
    let fireworks = [];
    let particles = [];
    let hue = 0;

    window.addEventListener('resize', () => {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
    });

    canvas.addEventListener('click', (e) => {
        fireworks.push(new Firework(W/2, H, e.clientX, e.clientY));
    });

    function random(min, max) { return Math.random() * (max - min) + min; }

    class Firework {
        constructor(sx, sy, tx, ty) {
            this.x = sx; this.y = sy;
            this.sx = sx; this.sy = sy;
            this.tx = tx; this.ty = ty;
            this.dist = Math.hypot(tx - sx, ty - sy);
            this.len = 0;
            this.angle = Math.atan2(ty - sy, tx - sx);
            this.speed = 2;
            this.acc = 1.05;
        }
        update() {
            this.speed *= this.acc;
            this.len += this.speed;
            this.x = this.sx + Math.cos(this.angle) * this.len;
            this.y = this.sy + Math.sin(this.angle) * this.len;
            return this.len >= this.dist;
        }
        draw() {
            ctx.beginPath();
            ctx.moveTo(this.sx, this.sy);
            ctx.lineTo(this.x, this.y);
            ctx.strokeStyle = 'hsl('+hue+',100%,60%)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
    }

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.angle = random(0, Math.PI * 2);
            this.speed = random(1, 10);
            this.friction = 0.95;
            this.gravity = 0.1;
            this.hue = random(hue - 30, hue + 30);
            this.alpha = 1;
            this.decay = random(0.01, 0.02);
        }
        update() {
            this.speed *= this.friction;
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed + this.gravity;
            this.alpha -= this.decay;
            return this.alpha <= 0;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
            ctx.fillStyle = 'hsla('+this.hue+',100%,60%,'+this.alpha+')';
            ctx.fill();
        }
    }

    function explode(x, y) {
        for(let i = 0; i < 50; i++) {
            particles.push(new Particle(x, y));
        }
    }

    setInterval(() => {
        fireworks.push(new Firework(random(100, W-100), H, random(100, W-100), random(100, H/2)));
    }, 800);

    function loop() {
        requestAnimationFrame(loop);
        hue = (hue + 1) % 360;
        ctx.fillStyle = 'rgba(0,0,0,0.1)';
        ctx.fillRect(0, 0, W, H);
        
        for(let i = fireworks.length - 1; i >= 0; i--) {
            fireworks[i].draw();
            if(fireworks[i].update()) {
                explode(fireworks[i].tx, fireworks[i].ty);
                fireworks.splice(i, 1);
            }
        }
        
        for(let i = particles.length - 1; i >= 0; i--) {
            particles[i].draw();
            if(particles[i].update()) {
                particles.splice(i, 1);
            }
        }
    }

    loop();
    </script>
</body>
</html>
