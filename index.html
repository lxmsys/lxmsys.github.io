<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hihi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #050505; overflow: hidden; font-family: 'Microsoft YaHei', sans-serif; }
        #mycanvas { display: block; cursor: crosshair; }
        #hint {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.3); font-size: 14px; letter-spacing: 2px;
            animation: pulse 2s infinite; pointer-events: none;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
    </style>
</head>
<body>
    <canvas id="mycanvas"></canvas>
    <div id="hint">点击屏幕 · 绽放浪漫</div>
    
    <script>
    const CONFIG = {
        particleCount: 150,     
        gravity: 0.1,          
        friction: 0.96,        
        autoFirework: true,
        autoInterval: 40,
        palettes: [30, 200, 150, 280, 0] // 极光配色池
    };

    const canvas = document.getElementById("mycanvas");
    const ctx = canvas.getContext("2d");
    let clientW = canvas.width = window.innerWidth;
    let clientH = canvas.height = window.innerHeight;

    let fireworks = [], particles = [];
    let currentCastleHue = 200; // 城堡初始颜色

    function random(min, max) { return Math.random() * (max - min) + min; }
    function distance(sx, sy, tx, ty) { return Math.sqrt((tx - sx) ** 2 + (ty - sy) ** 2); }

    // --- 城堡轮廓变化逻辑 ---
    function drawCastle() {
        const cw = clientW / 2;
        const b = clientH - 10;
        
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.beginPath();
        // 轮廓颜色：随最新炸开的烟花色相(currentCastleHue)变化
        ctx.strokeStyle = `hsla(${currentCastleHue}, 100%, 60%, 0.3)`;
        ctx.lineWidth = 2;
        ctx.shadowBlur = 15;
        ctx.shadowColor = `hsla(${currentCastleHue}, 100%, 50%, 0.5)`;
        
        ctx.moveTo(cw - 160, b);
        ctx.lineTo(cw - 160, b - 80);
        ctx.lineTo(cw - 120, b - 130);
        ctx.lineTo(cw - 80, b - 80);
        ctx.lineTo(cw - 60, b - 180);
        ctx.lineTo(cw, b - 260); // 顶尖
        ctx.lineTo(cw + 60, b - 180);
        ctx.lineTo(cw + 80, b - 80);
        ctx.lineTo(cw + 120, b - 130);
        ctx.lineTo(cw + 160, b - 80);
        ctx.lineTo(cw + 160, b);
        ctx.stroke();
        ctx.restore();
    }

    class Firework {
        constructor(sx, sy, tx, ty) {
            this.x = sx; this.y = sy; this.sx = sx; this.sy = sy;
            this.tx = tx; this.ty = ty;
            this.targetDistance = distance(sx, sy, tx, ty);
            this.distanceTraveled = 0;
            this.trail = [];
            this.trailLength = 4;
            while(this.trailLength--) { this.trail.push({x: sx, y: sy}); }
            
            this.angle = Math.atan2(ty - sy, tx - sx);
            this.speed = 2; 
            this.acceleration = 1.04;
            this.hue = CONFIG.palettes[Math.floor(Math.random() * CONFIG.palettes.length)];
        }
        update(index) {
            this.trail.pop(); 
            this.trail.unshift({x: this.x, y: this.y});
            this.speed *= this.acceleration;
            const vx = Math.cos(this.angle) * this.speed;
            const vy = Math.sin(this.angle) * this.speed;
            this.distanceTraveled = distance(this.sx, this.sy, this.x + vx, this.y + vy);
            
            if (this.distanceTraveled >= this.targetDistance) {
                currentCastleHue = this.hue; // 爆炸瞬间，通知城堡改变颜色
                createParticles(this.tx, this.ty, this.hue);
                fireworks.splice(index, 1);
            } else {
                this.x += vx; this.y += vy;
            }
        }
        draw() {
            ctx.beginPath();
            ctx.moveTo(this.trail[this.trail.length - 1].x, this.trail[this.trail.length - 1].y);
            ctx.lineTo(this.x, this.y);
            ctx.strokeStyle = `hsl(${this.hue}, 100%, 80%)`;
            ctx.lineWidth = 1.5; 
            ctx.stroke();
        }
    }

    class Particle {
        constructor(x, y, baseHue) {
            this.x = x; this.y = y;
            this.trail = []; this.trailLength = 6;
            while(this.trailLength--) { this.trail.push({x: x, y: y}); }
            
            this.angle = random(0, Math.PI * 2);
            this.speed = random(1, 10);
            this.friction = CONFIG.friction; 
            this.gravity = CONFIG.gravity;
            this.hue = random(baseHue - 20, baseHue + 20);
            this.brightness = random(50, 80);
            this.alpha = 1; 
            this.decay = random(0.012, 0.025);
        }
        update(index) {
            this.trail.pop(); 
            this.trail.unshift({x: this.x, y: this.y});
            this.speed *= this.friction;
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed + this.gravity;
            this.alpha -= this.decay;
            if (this.alpha <= this.decay) particles.splice(index, 1);
        }
        draw() {
            ctx.beginPath();
            ctx.moveTo(this.trail[this.trail.length - 1].x, this.trail[this.trail.length - 1].y);
            ctx.lineTo(this.x, this.y);
            ctx.strokeStyle = `hsla(${this.hue}, 100%, ${this.brightness}%, ${this.alpha})`;
            ctx.lineWidth = 2; 
            ctx.stroke();
        }
    }

    function createFirework(sx, sy, tx, ty) { fireworks.push(new Firework(sx, sy, tx, ty)); }
    function createParticles(x, y, hue) { for (let i = 0; i < CONFIG.particleCount; i++) particles.push(new Particle(x, y, hue)); }

    canvas.addEventListener('mousedown', (e) => {
        // 从城堡底部中心升起
        createFirework(clientW / 2, clientH, e.clientX, e.clientY);
    });

    window.addEventListener('resize', () => {
        clientW = canvas.width = window.innerWidth;
        clientH = canvas.height = window.innerHeight;
    });

    function loop() {
        requestAnimationFrame(loop);
        
        ctx.globalCompositeOperation = 'destination-out';
        ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
        ctx.fillRect(0, 0, clientW, clientH);
        ctx.globalCompositeOperation = 'lighter';
        
        let i = fireworks.length; while(i--) { fireworks[i].draw(); fireworks[i].update(i); }
        let j = particles.length; while(j--) { particles[j].draw(); particles[j].update(j); }
        
        // 绘制霓虹轮廓城堡
        drawCastle();
        
        if (CONFIG.autoFirework) {
            let timerTick = (window.tick || 0) + 1;
            window.tick = timerTick;
            if (timerTick >= CONFIG.autoInterval) {
                createFirework(random(clientW * 0.1, clientW * 0.9), clientH, random(clientW * 0.1, clientW * 0.9), random(clientH * 0.1, clientH * 0.4));
                window.tick = 0;
            }
        }
    }

    loop();
    </script>
</body>
</html>
