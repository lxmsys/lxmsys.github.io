<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 丝滑浪漫烟花</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false }); // 优化：关闭透明通道提升性能
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

const SETTINGS = {
    maxParticles: 800,    // 严格限制总数，防止卡顿
    pCount: 80,           // 单次爆炸粒子数
    gravity: 0.1,
    friction: 0.95,
    colors: [30, 200, 280, 0, 150] 
};

let fireworks = [], particles = [];

function random(min, max) { return Math.random() * (max - min) + min; }

class Firework {
    constructor(sx, sy, tx, ty) {
        this.x = sx; this.y = sy;
        this.tx = tx; this.ty = ty;
        this.hue = SETTINGS.colors[Math.floor(Math.random() * SETTINGS.colors.length)];
        this.speed = 2;
        this.acc = 1.04;
        this.angle = Math.atan2(ty - sy, tx - sx);
        this.dist = Math.sqrt((tx-sx)**2 + (ty-sy)**2);
        this.traveled = 0;
    }
    update(idx) {
        this.speed *= this.acc;
        let vx = Math.cos(this.angle) * this.speed;
        let vy = Math.sin(this.angle) * this.speed;
        this.x += vx; this.y += vy;
        this.traveled += Math.sqrt(vx*vx + vy*vy);
        
        if(this.traveled >= this.dist) {
            this.explode();
            fireworks.splice(idx, 1);
        }
    }
    draw() {
        ctx.strokeStyle = `hsl(${this.hue}, 100%, 70%)`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(this.x - Math.cos(this.angle)*5, this.y - Math.sin(this.angle)*5);
        ctx.lineTo(this.x, this.y);
        ctx.stroke();
    }
    explode() {
        // 限制粒子爆发，如果屏幕粒子太多就少生点
        let count = particles.length > SETTINGS.maxParticles ? 20 : SETTINGS.pCount;
        for(let i=0; i<count; i++) {
            particles.push(new Particle(this.tx, this.ty, this.hue));
        }
    }
}

class Particle {
    constructor(x, y, hue) {
        this.x = x; this.y = y;
        this.hue = hue;
        this.angle = random(0, Math.PI * 2);
        this.speed = random(1, 8);
        this.alpha = 1;
        this.decay = random(0.015, 0.03);
    }
    update(idx) {
        this.speed *= SETTINGS.friction;
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed + SETTINGS.gravity;
        this.alpha -= this.decay;
        if(this.alpha <= 0) particles.splice(idx, 1);
    }
    draw() {
        // 性能关键：不再使用 shadowBlur
        ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${this.alpha})`;
        ctx.fillRect(this.x, this.y, 2, 2); // 用 fillRect 代替 arc 性能更好
    }
}

function loop() {
    // 快速清屏
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.fillRect(0, 0, width, height);
    
    ctx.globalCompositeOperation = 'lighter';

    let i = fireworks.length; while(i--) { fireworks[i].draw(); fireworks[i].update(i); }
    let j = particles.length; while(j--) { particles[j].draw(); particles[j].update(j); }

    if(Math.random() < 0.03) {
        fireworks.push(new Firework(random(width*0.2, width*0.8), height, random(width*0.1, width*0.9), random(height*0.1, height*0.4)));
    }
    requestAnimationFrame(loop);
}

window.addEventListener('mousedown', (e) => {
    fireworks.push(new Firework(width/2, height, e.clientX, e.clientY));
});

window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
});

loop();
</script>
</body>
</html>
