<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hihi</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #010105; overflow: hidden; cursor: crosshair; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="mycanvas"></canvas>
    
    <script>
    const CONFIG = {
        particleCount: 160,     
        gravity: 0.1,          
        friction: 0.95,        
        autoFirework: true,
        autoInterval: 45,
        palettes: [180, 200, 280, 320, 45] 
    };

    const canvas = document.getElementById("mycanvas");
    const ctx = canvas.getContext("2d");
    let clientW = canvas.width = window.innerWidth;
    let clientH = canvas.height = window.innerHeight;

    let fireworks = [], particles = [];
    let currentHue = 180;

    // --- 城堡 3.0：线条勾勒梦幻版 ---
    function drawCastle() {
        const cx = clientW / 2;
        const b = clientH - 5;
        
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.strokeStyle = `hsla(${currentHue}, 90%, 60%, 0.25)`;
        ctx.lineWidth = 1;
        ctx.shadowBlur = 10;
        ctx.shadowColor = `hsla(${currentHue}, 100%, 50%, 0.4)`;

        // 绘制一组细长的梦幻尖塔
        function tower(x, w, h) {
            ctx.strokeRect(x - w/2, b - h, w, h);
            // 尖顶细化
            ctx.beginPath();
            ctx.moveTo(x - w/2, b - h);
            ctx.lineTo(x, b - h - w * 1.5);
            ctx.lineTo(x + w/2, b - h);
            ctx.stroke();
            // 内部装饰线
            ctx.beginPath();
            ctx.moveTo(x, b);
            ctx.lineTo(x, b - h);
            ctx.stroke();
        }

        tower(cx, 30, 200);      // 主塔
        tower(cx - 60, 20, 140); // 左侧塔
        tower(cx + 60, 20, 140); // 右侧塔
        tower(cx - 110, 15, 80); // 裙楼
        tower(cx + 110, 15, 80); // 裙楼
        
        ctx.restore();
    }

    // --- 核心修改：从城堡底部的随机区域发射 ---
    function getLaunchX() {
        const cx = clientW / 2;
        // 在城堡宽度范围内随机选择发射点
        return random(cx - 140, cx + 140);
    }

    class Firework {
        constructor(sx, sy, tx, ty) {
            this.x = sx; this.y = sy;
            this.sx = sx; this.sy = sy;
            this.tx = tx; this.ty = ty;
            this.trail = [];
            this.trailLength = 4;
            while(this.trailLength--) { this.trail.push({x: sx, y: sy}); }
            
            this.angle = Math.atan2(ty - sy, tx - sx);
            this.speed = 2; 
            this.acc = 1.05;
            this.hue = CONFIG.palettes[Math.floor(Math.random() * CONFIG.palettes.length)];
            this.targetDist = Math.sqrt((tx-sx)**2 + (ty-sy)**2);
            this.distTraveled = 0;
        }
        update(index) {
            this.trail.pop(); 
            this.trail.unshift({x: this.x, y: this.y});
            this.speed *= this.acc;
            const vx = Math.cos(this.angle) * this.speed;
            const vy = Math.sin(this.angle) * this.speed;
            this.x += vx; this.y += vy;
            this.distTraveled += this.speed;
            
            if (this.distTraveled >= this.targetDist) {
                currentHue = this.hue; 
                createParticles(this.tx, this.ty, this.hue);
                fireworks.splice(index, 1);
            }
        }
        draw() {
            ctx.beginPath();
            ctx.moveTo(this.trail[this.trail.length - 1].x, this.trail[this.trail.length - 1].y);
            ctx.lineTo(this.x, this.y);
            ctx.strokeStyle = `hsla(${this.hue}, 100%, 80%, 0.9)`;
            ctx.lineWidth = 1.5; 
            ctx.stroke();
        }
    }

    class Particle {
        constructor(x, y, baseHue) {
            this.x = x; this.y = y;
            this.trail = []; this.trailLength = 8; 
            while(this.trailLength--) { this.trail.push({x: x, y: y}); }
            this.angle = random(0, Math.PI * 2);
            this.speed = random(1, 9);
            this.friction = CONFIG.friction; 
            this.gravity = CONFIG.gravity;
            this.hue = random(baseHue - 20, baseHue + 20);
            this.alpha = 1; 
            this.decay = random(0.01, 0.022);
        }
        update(index) {
            this.trail.pop(); 
            this.trail.unshift({x: this.x, y: this.y});
            this.speed *= this.friction;
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed + this.gravity;
            this.alpha -= this.decay;
            if (this.alpha <= 0) particles.splice(index, 1);
        }
        draw() {
            ctx.beginPath();
            ctx.moveTo(this.trail[this.trail.length - 1].x, this.trail[this.trail.length - 1].y);
            for(let i=this.trail.length-2; i>=0; i--) ctx.lineTo(this.trail[i].x, this.trail[i].y);
            ctx.strokeStyle = `hsla(${this.hue}, 100%, 65%, ${this.alpha})`;
            ctx.lineWidth = 2; 
            ctx.stroke();
        }
    }

    function createParticles(x, y, hue) { 
        for (let i = 0; i < CONFIG.particleCount; i++) particles.push(new Particle(x, y, hue)); 
    }

    canvas.addEventListener('mousedown', (e) => {
        // 点击释放也从城堡底部范围升起
        fireworks.push(new Firework(getLaunchX(), clientH, e.clientX, e.clientY));
    });

    window.addEventListener('resize', () => {
        clientW = canvas.width = window.innerWidth;
        clientH = canvas.height = window.innerHeight;
    });

    function loop() {
        requestAnimationFrame(loop);
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'rgba(0, 0, 5, 0.2)'; 
        ctx.fillRect(0, 0, clientW, clientH);
        
        drawCastle();
        
        ctx.globalCompositeOperation = 'lighter';
        let i = fireworks.length; while(i--) { fireworks[i].draw(); fireworks[i].update(i); }
        let j = particles.length; while(j--) { particles[j].draw(); particles[j].update(j); }
        
        if (CONFIG.autoFirework) {
            let timerTick = (window.tick || 0) + 1;
            window.tick = timerTick;
            if (timerTick >= CONFIG.autoInterval) {
                // 自动释放点锁定在城堡底部区域
                fireworks.push(new Firework(getLaunchX(), clientH, random(clientW*0.1, clientW*0.9), random(clientH*0.1, clientH*0.5)));
                window.tick = 0;
            }
        }
    }

    loop();
    </script>
</body>
</html>
