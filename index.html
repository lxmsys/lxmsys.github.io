<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hihi</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #000; overflow: hidden; cursor: crosshair; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="mycanvas"></canvas>
    
    <script>
    const CONFIG = {
        particleCount: 160,     
        gravity: 0.08,          
        friction: 0.96,        
        autoFirework: true,
        autoInterval: 40,
        palettes: [180, 210, 280, 330, 45] 
    };

    const canvas = document.getElementById("mycanvas");
    const ctx = canvas.getContext("2d");
    let clientW = canvas.width = window.innerWidth;
    let clientH = canvas.height = window.innerHeight;

    let fireworks = [], particles = [];
    let currentHue = 180;
    let tick = 0;

    function random(min, max) { return Math.random() * (max - min) + min; }
    function distance(x1, y1, x2, y2) { return Math.sqrt((x2-x1)**2 + (y2-y1)**2); }

    // --- 精细化迪士尼风格城堡绘制逻辑 ---
    function drawCastle() {
        const cx = clientW / 2;
        const b = clientH;
        
        ctx.save();
        ctx.globalCompositeOperation = 'source-over';
        
        // 霓虹发光设置
        ctx.strokeStyle = `hsla(${currentHue}, 100%, 70%, 0.4)`;
        ctx.fillStyle = `hsla(${currentHue}, 100%, 10%, 0.7)`; // 城堡主体带一点深色填充
        ctx.lineWidth = 1.5;
        ctx.shadowBlur = 20;
        ctx.shadowColor = `hsla(${currentHue}, 100%, 50%, 0.5)`;

        // 绘制塔楼的通用函数
        function tower(x, w, h, roofH, hasFlag = false) {
            // 塔身
            ctx.beginPath();
            ctx.rect(x - w/2, b - h, w, h);
            ctx.fill();
            ctx.stroke();

            // 塔屋顶 (带有弧度的圆锥顶)
            ctx.beginPath();
            ctx.moveTo(x - w/2 - 2, b - h);
            ctx.quadraticCurveTo(x, b - h - roofH, x + w/2 + 2, b - h);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // 旗杆
            if (hasFlag) {
                ctx.beginPath();
                ctx.moveTo(x, b - h - roofH * 0.8);
                ctx.lineTo(x, b - h - roofH - 15);
                ctx.stroke();
            }
        }

        // 1. 最底层楼座
        ctx.beginPath();
        ctx.rect(cx - 150, b - 50, 300, 50);
        ctx.fill(); ctx.stroke();

        // 2. 两侧基座塔
        tower(cx - 120, 40, 90, 60);
        tower(cx + 120, 40, 90, 60);

        // 3. 次级主塔 (中间两根)
        tower(cx - 55, 35, 160, 80, true);
        tower(cx + 55, 35, 160, 80, true);

        // 4. 最高主塔
        tower(cx, 50, 220, 110, true);

        // 5. 底部装饰拱门
        ctx.beginPath();
        ctx.arc(cx, b - 5, 25, Math.PI, 0);
        ctx.stroke();
        
        ctx.restore();
    }

    class Firework {
        constructor(sx, sy, tx, ty) {
            this.x = sx; this.y = sy;
            this.sx = sx; this.sy = sy;
            this.tx = tx; this.ty = ty;
            this.trail = [];
            let len = 5; while(len--) this.trail.push({x: sx, y: sy});
            this.angle = Math.atan2(ty - sy, tx - sx);
            this.speed = 2.2; 
            this.acc = 1.045;
            this.hue = CONFIG.palettes[Math.floor(Math.random() * CONFIG.palettes.length)];
            this.targetDist = distance(sx, sy, tx, ty);
            this.distTraveled = 0;
        }
        update(index) {
            this.trail.pop(); 
            this.trail.unshift({x: this.x, y: this.y});
            this.speed *= this.acc;
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed;
            this.distTraveled = distance(this.sx, this.sy, this.x, this.y);
            if (this.distTraveled >= this.targetDist) {
                currentHue = this.hue; 
                for (let i = 0; i < CONFIG.particleCount; i++) particles.push(new Particle(this.tx, this.ty, this.hue));
                fireworks.splice(index, 1);
            }
        }
        draw() {
            ctx.beginPath();
            ctx.moveTo(this.trail[this.trail.length - 1].x, this.trail[this.trail.length - 1].y);
            ctx.lineTo(this.x, this.y);
            ctx.strokeStyle = `hsla(${this.hue}, 100%, 80%, 1)`;
            ctx.lineWidth = 2; 
            ctx.stroke();
        }
    }

    class Particle {
        constructor(x, y, hue) {
            this.x = x; this.y = y;
            this.trail = []; let len = 10; while(len--) this.trail.push({x: x, y: y});
            this.angle = random(0, Math.PI * 2);
            this.speed = random(1, 10);
            this.friction = CONFIG.friction; 
            this.gravity = CONFIG.gravity;
            this.hue = random(hue - 20, hue + 20);
            this.alpha = 1; 
            this.decay = random(0.01, 0.02);
        }
        update(index) {
            this.trail.pop(); 
            this.trail.unshift({x: this.x, y: this.y});
            this.speed *= this.friction;
            this.x += Math.cos(this.angle) * this.speed;
            this.y += Math.sin(this.angle) * this.speed + this.gravity;
            this.alpha -= this.decay;
            if (this.alpha <= 0) particles.splice(index, 1);
        }
        draw() {
            ctx.beginPath();
            ctx.moveTo(this.trail[this.trail.length - 1].x, this.trail[this.trail.length - 1].y);
            for(let i=this.trail.length-2; i>=0; i--) ctx.lineTo(this.trail[i].x, this.trail[i].y);
            ctx.strokeStyle = `hsla(${this.hue}, 100%, 65%, ${this.alpha})`;
            ctx.lineWidth = 1.8; 
            ctx.stroke();
        }
    }

    function launch() {
        const cx = clientW / 2;
        fireworks.push(new Firework(random(cx - 180, cx + 180), clientH, random(clientW * 0.1, clientW * 0.9), random(clientH * 0.1, clientH * 0.5)));
    }

    canvas.addEventListener('mousedown', (e) => {
        const cx = clientW / 2;
        fireworks.push(new Firework(random(cx - 180, cx + 180), clientH, e.clientX, e.clientY));
    });

    window.addEventListener('resize', () => {
        clientW = canvas.width = window.innerWidth;
        clientH = canvas.height = window.innerHeight;
    });

    function loop() {
        requestAnimationFrame(loop);
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = 'rgba(0, 0, 0, 0.22)'; 
        ctx.fillRect(0, 0, clientW, clientH);
        
        drawCastle();
        
        ctx.globalCompositeOperation = 'lighter';
        let i = fireworks.length; while(i--) { fireworks[i].draw(); fireworks[i].update(i); }
        let j = particles.length; while(j--) { particles[j].draw(); particles[j].update(j); }
        
        if (CONFIG.autoFirework) {
            tick++;
            if (tick >= CONFIG.autoInterval) { launch(); tick = 0; }
        }
    }
    loop();
    </script>
</body>
</html>
